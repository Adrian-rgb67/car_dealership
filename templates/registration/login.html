{% extends "base.html" %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-brand-50 rounded-2xl mb-4">
                    <svg class="w-7 h-7 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
                <p class="text-gray-500 mt-1">Sign in to manage your inventory</p>
            </div>

            <form method="post" class="space-y-5">
                {% csrf_token %}

                {% if form.errors %}
                <div class="bg-red-50 border border-red-200 rounded-xl p-4">
                    <p class="text-sm text-red-800 font-medium">Invalid username or password. Please try again.</p>
                </div>
                {% endif %}

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5" for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" autofocus
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors"
                           placeholder="Enter your username">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5" for="id_password">Password</label>
                    <input type="password" name="password" id="id_password"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors"
                           placeholder="Enter your password">
                </div>

                <button type="submit" class="w-full py-3 bg-brand-600 text-white font-bold rounded-xl hover:bg-brand-700 shadow-sm hover:shadow-lg transition-all">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="text-brand-600 font-semibold hover:text-brand-700 transition-colors">Create one</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
